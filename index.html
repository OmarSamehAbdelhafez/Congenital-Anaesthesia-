<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CongenCor — Congenital Heart Disease Perioperative Reference</title>
<meta name="description" content="A bedside decision-support reference for anesthesiologists managing congenital heart disease through surgery."/>
<style>
/* ============================================================
   CongenCor — Congenital Heart Disease Perioperative Reference
   Design language: anatomical heart, arterial red / venous purple
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:            #fdf0f3;
  --bg-soft:       #fff6f8;
  --surface:       #ffffff;
  --surface-2:     #fdedf1;
  --surface-3:     #fbe1e8;
  --line:          #f2ccd6;
  --line-soft:     #f6dee5;
  --red-deep:      #7a1530;
  --red:           #c22a41;
  --red-bright:    #d63a52;
  --red-glow:      #c9314d;
  --purple-deep:   #efe0f6;
  --purple:        #7d3fa3;
  --purple-bright: #8a48b3;
  --purple-glow:   #7d3fa3;
  --gold:          #a6742a;
  --text:          #2b1420;
  --text-dim:      #6b4a58;
  --text-faint:    #a67f8c;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --shadow-card: 0 8px 30px -14px rgba(124,50,80,0.25);
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
}

*,*::before,*::after{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  margin:0;
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(125,63,163,0.10), transparent 60%),
    radial-gradient(ellipse 700px 600px at 100% 0%, rgba(194,42,65,0.08), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.55;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{ font-family:var(--font-display); font-weight:600; margin:0; color:var(--text); letter-spacing:-0.01em; }
a{ color:inherit; }
button{ font-family:inherit; }
::selection{ background:var(--purple); color:#fff; }

a:focus-visible, button:focus-visible, input:focus-visible{
  outline:2px solid var(--purple-glow);
  outline-offset:2px;
}
.mono{ font-family:var(--font-mono); }

#app{ display:flex; min-height:100vh; }

.sidebar{
  width:272px; flex-shrink:0; background:linear-gradient(180deg, var(--bg-soft), var(--bg));
  border-right:1px solid var(--line-soft); padding:22px 18px 28px;
  position:sticky; top:0; height:100vh; overflow-y:auto;
}
.brand{ display:flex; align-items:center; gap:10px; text-decoration:none; margin-bottom:22px; padding:2px 4px; }
.brand svg{ width:34px; height:34px; flex-shrink:0; }
.brand-name{ font-family:var(--font-display); font-size:20px; font-weight:700; color:var(--text); line-height:1.1; }
.brand-sub{ display:block; font-family:var(--font-mono); font-size:10px; letter-spacing:.09em; text-transform:uppercase; color:var(--text-faint); margin-top:1px; }

.nav-section-label{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-faint); margin:18px 8px 8px; }
.nav-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:2px; }
.nav-link{ display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:10px; text-decoration:none; color:var(--text-dim); font-size:13.5px; font-weight:500; transition:background .15s, color .15s; }
.nav-link:hover{ background:var(--surface); color:var(--text); }
.nav-link.active{ background:var(--surface-2); color:var(--text); }
.nav-link .dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; background:var(--purple); }
.nav-link.dot-red .dot{ background:var(--red); }
.nav-link.active .dot{ background:var(--red-bright); box-shadow:0 0 8px var(--red-bright); }
.sidebar-footer{ margin-top:22px; padding:14px 10px 4px; border-top:1px solid var(--line-soft); font-size:11px; color:var(--text-faint); line-height:1.5; }

.main{ flex:1; min-width:0; }
.topbar{ display:none; position:sticky; top:0; z-index:20; align-items:center; gap:10px; padding:12px 16px; background:rgba(253,240,243,0.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line-soft); }
.topbar .brand{ margin:0; flex:1; }
.topbar .brand svg{ width:26px; height:26px; }
.topbar .brand-name{ font-size:16px; }
.icon-btn{ background:var(--surface); border:1px solid var(--line); color:var(--text); width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.content{ max-width:980px; margin:0 auto; padding:36px 40px 90px; }

.search-wrap{ position:relative; margin-bottom:6px; }
.search-input{ width:100%; background:var(--surface); border:1px solid var(--line); color:var(--text); border-radius:12px; padding:11px 14px 11px 38px; font-size:14px; font-family:var(--font-body); }
.search-input::placeholder{ color:var(--text-faint); }
.search-icon{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-faint); pointer-events:none; }
.search-results{ position:absolute; left:0; right:0; top:calc(100% + 6px); background:var(--surface); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow-card); max-height:60vh; overflow-y:auto; z-index:40; }
.search-results .sr-item{ display:block; padding:10px 14px; text-decoration:none; border-bottom:1px solid var(--line-soft); }
.search-results .sr-item:last-child{ border-bottom:none; }
.search-results .sr-item:hover{ background:var(--surface-2); }
.sr-name{ font-size:13.5px; font-weight:600; color:var(--text); }
.sr-cat{ font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--purple-bright); margin-bottom:2px; display:block; }
.sr-snip{ font-size:12px; color:var(--text-faint); margin-top:2px; }
.search-empty{ padding:14px; font-size:13px; color:var(--text-faint); }

.hero{ display:flex; align-items:center; gap:36px; padding:8px 0 30px; margin-bottom:8px; border-bottom:1px solid var(--line-soft); }
.hero-heart{ width:132px; height:132px; flex-shrink:0; }
.hero-eyebrow{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--purple-bright); margin-bottom:10px; display:block; }
.hero h1{ font-size:34px; line-height:1.08; margin-bottom:10px; }
.hero h1 em{ font-style:normal; color:transparent; background:linear-gradient(100deg,var(--red-bright),var(--purple-bright)); -webkit-background-clip:text; background-clip:text; }
.hero p{ color:var(--text-dim); font-size:15px; max-width:56ch; margin:0; }
.home-search{ margin:26px 0 8px; max-width:560px; }

.section-heading{ font-family:var(--font-mono); font-size:11px; letter-spacing:.13em; text-transform:uppercase; color:var(--text-faint); margin:34px 0 14px; display:flex; align-items:center; gap:10px; }
.section-heading::after{ content:''; flex:1; height:1px; background:var(--line-soft); }

.cat-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:14px; }
.cat-card{ position:relative; display:block; text-decoration:none; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-md); padding:18px 18px 16px; overflow:hidden; transition:transform .18s ease, border-color .18s ease, background .18s ease; }
.cat-card:hover{ transform:translateY(-2px); border-color:var(--purple); background:var(--surface-2); }
.cat-card.acc-red:hover{ border-color:var(--red); }
.cat-card .cat-icon{ width:30px; height:30px; margin-bottom:12px; color:var(--purple-bright); }
.cat-card.acc-red .cat-icon{ color:var(--red-bright); }
.cat-card h3{ font-size:16.5px; margin-bottom:6px; }
.cat-card p{ font-size:12.8px; color:var(--text-faint); margin:0 0 10px; line-height:1.45; }
.cat-count{ font-family:var(--font-mono); font-size:10.5px; color:var(--red-glow); letter-spacing:.05em; }
.cat-card.acc-purple .cat-count{ color:var(--purple); }
.cat-card .vessel{ position:absolute; right:-18px; top:-18px; width:100px; height:100px; opacity:.10; background:radial-gradient(circle, var(--purple-glow), transparent 70%); }
.cat-card.acc-red .vessel{ background:radial-gradient(circle, var(--red-glow), transparent 70%); }
.protocols-strip{ display:flex; flex-wrap:wrap; gap:10px; }
.proto-chip{ display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:8px 14px 8px 10px; text-decoration:none; font-size:12.5px; color:var(--text-dim); }
.proto-chip:hover{ border-color:var(--red); color:var(--text); }
.proto-chip .dot{ width:6px; height:6px; border-radius:50%; background:var(--red-bright); }
.footnote{ margin-top:56px; padding-top:18px; border-top:1px solid var(--line-soft); font-size:12px; color:var(--text-faint); line-height:1.6; max-width:70ch; }

.crumb{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text-faint); margin-bottom:16px; font-family:var(--font-mono); }
.crumb a{ text-decoration:none; color:var(--purple-bright); }
.crumb a:hover{ color:var(--purple-glow); }
.page-head{ margin-bottom:26px; }
.page-head h1{ font-size:28px; margin-bottom:8px; }
.page-head .short{ color:var(--text-dim); font-size:15px; max-width:65ch; }
.tag-row{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.tag{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; padding:4px 9px; border-radius:6px; border:1px solid var(--line); color:var(--text-faint); }
.tag.urgent{ color:#fff; background:var(--gold); border-color:var(--gold); font-weight:600; }
.tag.cyanotic{ color:#fff; background:var(--purple); border-color:var(--purple); font-weight:600; }
.tag.acyanotic{ color:#fff; background:var(--red); border-color:var(--red); font-weight:600; }
.lesion-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:14px; }
.lesion-card{ display:block; text-decoration:none; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-md); padding:16px 18px; transition:border-color .15s, transform .15s, background .15s; }
.lesion-card:hover{ border-color:var(--red); transform:translateY(-2px); background:var(--surface-2); }
.lesion-card.acc-purple:hover{ border-color:var(--purple); }
.lesion-card h4{ font-size:15.5px; margin-bottom:6px; }
.lesion-card p{ font-size:12.6px; color:var(--text-faint); margin:0; line-height:1.5; }

.card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:22px 24px; margin-bottom:16px; box-shadow:var(--shadow-card); }
.card-head{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.card-head .icon{ width:20px; height:20px; flex-shrink:0; }
.card-head h3{ font-size:16px; }
.card.side-red{ border-left:3px solid var(--red); }
.card.side-purple{ border-left:3px solid var(--purple); }
.card.side-alert{ border-left:3px solid var(--red-bright); }
.bullets{ margin:0; padding-left:0; list-style:none; display:flex; flex-direction:column; gap:9px; }
.bullets li{ position:relative; padding-left:20px; font-size:14px; color:var(--text-dim); line-height:1.55; }
.bullets li::before{ content:''; position:absolute; left:0; top:8px; width:7px; height:7px; border-radius:50%; background:var(--purple-bright); }
.card.side-red .bullets li::before{ background:var(--red-bright); }
.card.side-alert .bullets li::before{ background:var(--red-bright); box-shadow:0 0 6px rgba(214,58,82,0.4); }
.bullet-groups{ display:flex; flex-direction:column; gap:12px; }
.bullet-group{ background:var(--surface-2); border:1px solid var(--line-soft); border-radius:12px; padding:13px 15px; }
.bullet-group .bullets{ gap:8px; }
.bullet-group-title{ font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--purple-bright); font-weight:700; margin-bottom:8px; }
.card.side-red .bullet-group-title{ color:var(--red-glow); }
.inline-link{ color:var(--purple); font-weight:600; text-decoration:underline; cursor:pointer; }
.card.side-red .inline-link{ color:var(--red); }
.ref-inline{ margin-top:10px; padding:12px 14px; border-radius:10px; background:var(--surface-2); border:1px dashed var(--line); }
.ref-inline .ref-title{ font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--purple-bright); margin-bottom:8px; }
.link-chip{ display:inline-flex; align-items:center; gap:6px; margin-top:10px; background:var(--purple-deep); border:1px solid var(--purple); color:var(--purple-deep-text, var(--purple)); padding:6px 12px; border-radius:999px; font-size:12.5px; text-decoration:none; }
.link-chip:hover{ background:var(--purple); color:#fff; }

.dt-widget{ background:linear-gradient(160deg, var(--surface-2), var(--surface)); border:1px solid var(--line); border-radius:var(--radius-lg); padding:22px 24px 24px; margin-bottom:18px; position:relative; overflow:hidden; }
.dt-widget::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:linear-gradient(180deg, var(--red), var(--purple)); }
.dt-title{ font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--red-glow); margin-bottom:4px; }
.dt-crumbs{ display:flex; flex-wrap:wrap; gap:6px; margin:10px 0 16px; }
.dt-crumb{ display:flex; align-items:center; gap:6px; font-size:11.5px; background:var(--surface-3); color:var(--text-dim); padding:4px 10px; border-radius:999px; border:1px solid var(--line); }
.dt-crumb .n{ font-family:var(--font-mono); color:var(--purple-bright); }
.dt-reset{ font-family:var(--font-mono); font-size:11px; color:var(--text-faint); background:none; border:none; cursor:pointer; text-decoration:underline; padding:4px 0; margin-bottom:6px; }
.dt-reset:hover{ color:var(--red-glow); }
.dt-question{ font-size:16.5px; font-weight:600; color:var(--text); margin-bottom:14px; font-family:var(--font-display); }
.dt-options{ display:flex; flex-direction:column; gap:9px; }
.dt-option{ display:flex; align-items:center; justify-content:space-between; gap:10px; text-align:left; width:100%; background:var(--surface); border:1px solid var(--line); color:var(--text); padding:12px 16px; border-radius:12px; cursor:pointer; font-size:14px; font-family:var(--font-body); transition:border-color .15s, background .15s, transform .1s; }
.dt-option:hover{ border-color:var(--purple-bright); background:var(--surface-3); transform:translateX(2px); }
.dt-option .arrow{ opacity:.5; flex-shrink:0; }
.dt-option:hover .arrow{ opacity:1; color:var(--purple-glow); }

.dt-result{ background:var(--surface-3); border:1px solid var(--red); border-radius:14px; padding:16px 18px; margin-top:4px; }
.dt-result-label{ font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--red-glow); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.dt-result-label::before{ content:'\2665'; font-size:11px; }
.dt-result-text{ font-size:15px; color:var(--text); margin-bottom:8px; line-height:1.5; }

.back-link{ display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:var(--text-dim); font-size:13px; margin-bottom:18px; font-family:var(--font-mono); }
.back-link:hover{ color:var(--purple-glow); }
.pulse{ animation:pulse-beat 2.6s ease-in-out infinite; transform-origin:50% 55%; }
@media (prefers-reduced-motion: reduce){ .pulse{ animation:none; } }
@keyframes pulse-beat{ 0%,100%{ transform:scale(1); } 8%{ transform:scale(1.06); } 16%{ transform:scale(0.99); } 24%{ transform:scale(1.03); } 32%{ transform:scale(1); } }
.overlay{ position:fixed; inset:0; background:rgba(60,20,40,0.35); z-index:50; display:none; }
.overlay.show{ display:block; }

@media (max-width: 900px){
  .sidebar{ position:fixed; left:0; top:0; height:100vh; z-index:60; transform:translateX(-100%); transition:transform .22s ease; box-shadow:20px 0 40px rgba(124,50,80,0.18); }
  .sidebar.open{ transform:translateX(0); }
  .topbar{ display:flex; }
  .content{ padding:24px 18px 70px; }
  .hero{ flex-direction:column; align-items:flex-start; gap:16px; text-align:left; }
  .hero-heart{ width:96px; height:96px; }
  .hero h1{ font-size:26px; }
}
@media (max-width: 480px){ .cat-grid, .lesion-grid{ grid-template-columns:1fr; } }
@media print{ .sidebar, .topbar, .search-wrap, .back-link{ display:none !important; } body{ background:#fff; color:#000; } .card, .dt-widget{ background:#fff; border:1px solid #999; box-shadow:none; } }
</style>
</head>

    cyanotic: `<path d="M7 4c-2 3-3 6-3 9a8 8 0 0016 0c0-3-1-6-3-9M9 20v-3M15 20v-3" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`,
    lvoto: `<path d="M6 4h12l-4 8v8h-4v-8L6 4z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/>`,
    transposition: `<path d="M5 6l14 12M19 6L5 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="5" cy="6" r="1.7" fill="currentColor"/><circle cx="19" cy="18" r="1.7" fill="currentColor"/>`,
    univentricular: `<circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.7" fill="none"/><path d="M12 3.5v17" stroke="currentColor" stroke-width="1.2" opacity=".5"/>`,
    vascular: `<path d="M12 3v6M12 9c-5 0-6 3-6 6M12 9c5 0 6 3 6 6M6 15v6M18 15v6" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round"/>`,
    acquired: `<path d="M12 3c4 5 7 8.5 7 12.5A7 7 0 015 15.5C5 11.5 8 8 12 3z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/>`,
    protocols: `<path d="M3 12h4l2-7 4 14 2-7h6" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`,
  };

  const HEART_SVG = `
  <svg viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="heartClip">
        <path d="M100,215 C 38,178 16,124 22,86 C 26,54 54,33 76,44 C 90,51 97,64 100,80 C 103,64 110,51 124,44 C 146,33 174,54 178,86 C 184,124 162,178 100,215 Z"/>
      </clipPath>
      <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#e35468"/><stop offset="100%" stop-color="#7a1530"/>
      </linearGradient>
      <linearGradient id="purpleGrad" x1="1" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#b06fe0"/><stop offset="100%" stop-color="#3c1a4d"/>
      </linearGradient>
    </defs>
    <g clip-path="url(#heartClip)">
      <rect x="0" y="0" width="100" height="230" fill="url(#redGrad)"/>
      <rect x="100" y="0" width="100" height="230" fill="url(#purpleGrad)"/>
      <path d="M100,80 C97,120 96,160 100,208" fill="none" stroke="#fdf0f3" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
      <path d="M40,95 C60,105 70,120 72,140" fill="none" stroke="#fdf0f3" stroke-width="1.4" opacity="0.35"/>
      <path d="M160,95 C140,105 130,120 128,140" fill="none" stroke="#fdf0f3" stroke-width="1.4" opacity="0.35"/>
    </g>
    <path d="M100,215 C 38,178 16,124 22,86 C 26,54 54,33 76,44 C 90,51 97,64 100,80 C 103,64 110,51 124,44 C 146,33 174,54 178,86 C 184,124 162,178 100,215 Z"
          fill="none" stroke="#2b1420" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M108,52 C108,34 106,22 100,14 M100,14 C90,6 74,4 62,10 M100,14 C112,6 130,6 142,14"
          fill="none" stroke="#8a48b3" stroke-width="7" stroke-linecap="round"/>
    <path d="M92,50 C92,30 96,16 108,8 C 122,0 140,2 150,12"
          fill="none" stroke="#d63a52" stroke-width="7" stroke-linecap="round"/>
    <circle cx="44" cy="70" r="8.5" fill="#e35468" opacity="0.95"/>
    <circle cx="156" cy="70" r="8.5" fill="#a466cf" opacity="0.95"/>
  </svg>`;

  function esc(s){
    if(s===undefined||s===null) return "";
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function h(strings, ...vals){ return strings.reduce((a,s,i)=>a+s+(vals[i]!==undefined?vals[i]:''),''); }

  function renderRefBlock(refId){
    const block = SHARED[refId];
    if(!block) return '';
    let inner = `<div class="ref-title">${esc(block.title)}</div>`;
    if(block.subtitle) inner += `<div style="font-size:12px;color:var(--text-faint);margin:-4px 0 8px;">${esc(block.subtitle)}</div>`;
    if(block.bullets){
      inner += `<ul class="bullets">${block.bullets.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>`;
    }
    if(block.tree){
      inner += `<div class="dt-mount" data-embedded="1"></div>`;
    }
    const wrap = document.createElement('div');
    wrap.className = 'ref-inline';
    wrap.innerHTML = inner;
    if(block.tree){
      const mount = wrap.querySelector('.dt-mount');
      new DecisionTree(mount, block.tree, block.title).render();
    }
    return wrap;
  }

  function leadingNumber(str){
    const m = String(str).match(/^\s*(\d+)\s*[.\-):]/);
    return m ? parseInt(m[1], 10) : null;
  }
  function isHeaderLine(str){
    return leadingNumber(str) === null && /:\s*$/.test(String(str).trim());
  }

  // Maps a bullet-group's header text (colon stripped) to a DOM id, so
  // decision-tree leaves elsewhere on the same page can deep-link/scroll to it.
  const ANCHOR_HEADER_IDS = {
    'Reduce PVR': 'reduce-pvr'
  };

  // Splits a flat list of strings into groups, starting a new group whenever
  // a numbered list restarts back to 1 (or a lower number), or whenever the
  // sequence switches between "numbered" and "unnumbered" lines. This keeps
  // multiple distinct numbered lists that were stored back-to-back in the
  // same section from visually running together.
  function groupBulletItems(items){
    const groups = [];
    let current = [];
    let lastNum = null;
    items.forEach(item => {
      const num = leadingNumber(item);
      const header = isHeaderLine(item);
      if(header){
        if(current.length) groups.push(current);
        current = [];
        lastNum = null;
      } else if(num !== null){
        if(lastNum !== null && num <= lastNum){
          if(current.length) groups.push(current);
          current = [];
        }
        lastNum = num;
      } else {
        if(lastNum !== null){
          if(current.length) groups.push(current);
          current = [];
        }
        lastNum = null;
      }
      current.push(item);
    });
    if(current.length) groups.push(current);
    return groups;
  }

  // Renders a single bullet line, supporting an inline link syntax:
  // [Label](lesion:some_id) becomes a clickable link to that lesion page.
  function renderBulletLine(str){
    const li = document.createElement('li');
    let escaped = esc(str);
    escaped = escaped.replace(/\[([^\]]+)\]\(lesion:([a-zA-Z0-9_\-]+)\)/g,
      (m, text, id) => `<a href="#/lesion/${id}" class="inline-link">${text}</a>`);
    li.innerHTML = escaped;
    return li;
  }

  function plainBulletList(items){
    const ul = document.createElement('ul');
    ul.className = 'bullets';
    items.forEach(it => ul.appendChild(renderBulletLine(it)));
    return ul;
  }

  function bulletsWithRichContent(items){
    const groups = groupBulletItems(items);
    if(groups.length === 1 && !isHeaderLine(groups[0][0])){
      return plainBulletList(items);
    }
    const wrap = document.createElement('div');
    wrap.className = 'bullet-groups';
    groups.forEach(g => {
      const box = document.createElement('div');
      box.className = 'bullet-group';
      let rest = g;
      if(g.length > 1 && isHeaderLine(g[0])){
        const titleText = g[0].replace(/:\s*$/, '');
        const title = document.createElement('div');
        title.className = 'bullet-group-title';
        title.textContent = titleText;
        box.appendChild(title);
        if(ANCHOR_HEADER_IDS[titleText]) box.id = ANCHOR_HEADER_IDS[titleText];
        rest = g.slice(1);
      }
      box.appendChild(plainBulletList(rest));
      wrap.appendChild(box);
    });
    return wrap;
  }

  class DecisionTree {
    constructor(mount, tree, title){
      this.mount = mount;
      this.root = tree;
      this.title = title;
      this.path = [];
    }
    current(){
      let node = this.root;
      for(const step of this.path){ node = step.nextNode; }
      return node;
    }
    reset(){ this.path = []; this.render(); }
    choose(option, idx){
      const node = this.current();
      this.path.push({ label: option.label, nextNode: option.next || null, leaf: option.result || null });
      this.render();
    }
    jumpTo(i){
      this.path = this.path.slice(0, i);
      this.render();
    }
    render(){
      this.mount.innerHTML = '';
      const wrap = document.createElement('div');
      wrap.className = 'dt-widget';

      if(this.title){
        const t = document.createElement('div');
        t.className = 'dt-title';
        t.textContent = this.title;
        wrap.appendChild(t);
      }

      if(this.path.length){
        const reset = document.createElement('button');
        reset.className = 'dt-reset';
        reset.textContent = '\u21ba Start over';
        reset.onclick = () => this.reset();
        wrap.appendChild(reset);

        const crumbs = document.createElement('div');
        crumbs.className = 'dt-crumbs';
        this.path.forEach((step, i) => {
          const c = document.createElement('button');
          c.className = 'dt-crumb';
          c.style.cursor = 'pointer';
          c.innerHTML = `<span class="n">${i+1}</span> ${esc(step.label)}`;
          c.onclick = () => this.jumpTo(i);
          crumbs.appendChild(c);
        });
        wrap.appendChild(crumbs);
      }

      const last = this.path[this.path.length - 1];
      if(last && last.leaf){
        wrap.appendChild(this.renderLeaf(last.leaf));
      } else {
        const node = this.path.length ? last.nextNode : this.root;
        if(!node){
        } else {
          const q = document.createElement('div');
          q.className = 'dt-question';
          q.textContent = node.question;
          wrap.appendChild(q);

          const opts = document.createElement('div');
          opts.className = 'dt-options';
          node.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'dt-option';
            b.innerHTML = `<span>${esc(opt.label)}</span><span class="arrow">\u2192</span>`;
            b.onclick = () => this.choose(opt);
            opts.appendChild(b);
          });
          wrap.appendChild(opts);
        }
      }

      this.mount.appendChild(wrap);
    }
    renderLeaf(leaf){
      const box = document.createElement('div');
      box.className = 'dt-result';
      const label = document.createElement('div');
      label.className = 'dt-result-label';
      label.textContent = 'Recommended pathway';
      box.appendChild(label);
      const text = document.createElement('div');
      text.className = 'dt-result-text';
      text.textContent = leaf.text;
      box.appendChild(text);
      if(leaf.bullets){
        box.appendChild(bulletsWithRichContent(leaf.bullets));
      }
      if(leaf.refs){
        leaf.refs.forEach(r => { const el = renderRefBlock(r); if(el) box.appendChild(el); });
      }
      if(leaf.linkNote){
        const p = document.createElement('div');
        p.style.cssText = 'font-size:12.5px;color:var(--text-faint);margin-top:10px;';
        p.textContent = leaf.linkNote;
        box.appendChild(p);
      }
      if(leaf.linkTo && byId[leaf.linkTo]){
        const a = document.createElement('a');
        a.className = 'link-chip';
        a.href = '#/lesion/' + leaf.linkTo;
        a.innerHTML = `Continue: ${esc(byId[leaf.linkTo].name)} <span aria-hidden="true">\u2192</span>`;
        box.appendChild(a);
      }
      if(leaf.scrollTo){
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'link-chip';
        btn.style.cursor = 'pointer';
        btn.textContent = leaf.scrollLabel || 'Jump to measures \u2193';
        btn.onclick = () => {
          const el = document.getElementById(leaf.scrollTo);
          if(el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        box.appendChild(btn);
      }
      return box;
    }
  }

  function searchIndex(query){
    const q = query.trim().toLowerCase();
    if(q.length < 2) return [];
    const results = [];
    LESIONS.forEach(l => {
      let score = 0;
      const name = l.name.toLowerCase();
      if(name.includes(q)) score += name.startsWith(q) ? 100 : 50;
      if(l.short && l.short.toLowerCase().includes(q)) score += 10;
      const haystacks = ['overview','preop','intraop','tee','postop','complications','associations'];
      haystacks.forEach(k => {
        if(Array.isArray(l[k])){
          l[k].forEach(line => { if(line.toLowerCase().includes(q)) score += 3; });
        }
      });
      if(score > 0) results.push({ lesion: l, score });
    });
    results.sort((a,b) => b.score - a.score);
    return results.slice(0, 12);
  }

  function wireSearch(inputEl, resultsEl, onNavigate){
    let blurTimeout;
    inputEl.addEventListener('input', () => {
      const q = inputEl.value;
      const res = searchIndex(q);
      if(q.trim().length < 2){ resultsEl.style.display='none'; resultsEl.innerHTML=''; return; }
      if(!res.length){
        resultsEl.innerHTML = `<div class="search-empty">No matches for "${esc(q)}"</div>`;
        resultsEl.style.display='block';
        return;
      }
      resultsEl.innerHTML = res.map(r => `
        <a class="sr-item" href="#/lesion/${r.lesion.id}">
          <span class="sr-cat">${esc(catById[r.lesion.category] ? catById[r.lesion.category].name : r.lesion.category)}</span>
          <span class="sr-name">${esc(r.lesion.name)}</span>
          <div class="sr-snip">${esc(r.lesion.short || '')}</div>
        </a>`).join('');
      resultsEl.style.display='block';
    });
    inputEl.addEventListener('focus', () => { if(inputEl.value.trim().length>=2) resultsEl.style.display='block'; });
    inputEl.addEventListener('blur', () => { blurTimeout = setTimeout(()=>{ resultsEl.style.display='none'; }, 150); });
    resultsEl.addEventListener('mousedown', e => e.preventDefault());
  }

  const contentEl = document.getElementById('content');

  function renderSidebarNav(activeCat, activeLesion){
    const list = document.getElementById('nav-list');
    list.innerHTML = CATS.map(c => `
      <li>
        <a class="nav-link ${activeCat===c.id?'active':''} ${isCyanoticCat(c.id)?'':'dot-red'}" href="#/category/${c.id}">
          <span class="dot"></span>${esc(c.name)}
        </a>
      </li>`).join('');
  }

  function pageHeadHTML(title, short, tags){
    return `<div class="page-head">
      <h1>${esc(title)}</h1>
      ${short ? `<p class="short">${esc(short)}</p>` : ''}
      ${tags && tags.length ? `<div class="tag-row">${tags.map(t=>`<span class="tag${t.urgent?' urgent':''}${t.cyanotic?' cyanotic':''}${t.acyanotic?' acyanotic':''}">${esc(t.label)}</span>`).join('')}</div>` : ''}
    </div>`;
  }

  function renderHome(){
    renderSidebarNav(null, null);
    contentEl.innerHTML = `
      <div class="hero">
        <div class="hero-heart pulse">${HEART_SVG}</div>
        <div>
          <span class="hero-eyebrow">Perioperative reference &middot; congenital heart disease</span>
          <h1>Congen<em>Cor</em></h1>
          <p>A bedside decision-support reference for anesthesiologists managing congenital heart disease through surgery — built from a single working algorithm, organized lesion by lesion, with the shared protocols surfaced wherever they recur.</p>
        </div>
      </div>
      <div class="home-search search-wrap">
        <span class="search-icon">${searchIconSvg()}</span>
        <input id="home-search-input" class="search-input" type="text" placeholder="Search lesions, e.g. \u201cEbstein\u201d, \u201cRVOT\u201d, \u201cduct-dependent\u201d\u2026" autocomplete="off"/>
        <div id="home-search-results" class="search-results" style="display:none;"></div>
      </div>

      <div class="section-heading">Browse by category</div>
      <div class="cat-grid">
        ${CATS.filter(c=>c.id!=='protocols').map(catCardHTML).join('')}
      </div>

      <div class="section-heading">Core protocols</div>
      <div class="protocols-strip">
        ${LESIONS.filter(l=>l.category==='protocols').map(l=>`
          <a class="proto-chip" href="#/lesion/${l.id}"><span class="dot"></span>${esc(l.name)}</a>
        `).join('')}
      </div>

      <div class="footnote">CongenCor is a personal reference tool for qualified clinicians, distilled from one institution's working algorithm. It is not a substitute for current institutional protocols, primary literature, or individualized clinical judgement — always correlate with the specific patient and surgical team.<br/>Developed by Dr. Omar Sameh Abdelhafez, Consultant Anaesthesiologist.</div>
    `;
    wireSearch(document.getElementById('home-search-input'), document.getElementById('home-search-results'));
  }

  function searchIconSvg(){
    return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`;
  }

  function catCardHTML(c){
    const count = LESIONS.filter(l => l.category === c.id).length;
    return `<a class="cat-card ${accentClass(c.id)}" href="#/category/${c.id}">
      <div class="vessel"></div>
      <svg class="cat-icon" viewBox="0 0 24 24" fill="none">${ICONS[c.icon] || ''}</svg>
      <h3>${esc(c.name)}</h3>
      <p>${esc(c.blurb)}</p>
      <span class="cat-count">${count} ${count===1?'entry':'entries'}</span>
    </a>`;
  }

  function renderCategory(catId){
    const cat = catById[catId];
    renderSidebarNav(catId, null);
    if(!cat){ renderNotFound(); return; }
    const lesions = LESIONS.filter(l => l.category === catId);
    const cyanotic = isCyanoticCat(catId);
    contentEl.innerHTML = `
      <div class="crumb"><a href="#/">Home</a> <span>/</span> <span>${esc(cat.name)}</span></div>
      ${pageHeadHTML(cat.name, cat.blurb, [{ label: cyanotic ? 'Cyanotic' : 'Non-cyanotic', cyanotic: cyanotic, acyanotic: !cyanotic }])}
      <div class="lesion-grid">
        ${lesions.map(l => `
          <a class="lesion-card ${accentClass(l.category)}" href="#/lesion/${l.id}">
            <h4>${esc(l.name)}</h4>
            <p>${esc(l.short || '')}</p>
          </a>`).join('')}
      </div>
    `;
  }

  function renderSection(container, key, lesion){
    const meta = SECTION_META[key];
    const items = lesion[key];
    const refs = lesion[key+'Refs'];
    if((!items || !items.length) && (!refs || !refs.length)) return;

    const side = sectionSide(key, lesion.category);
    const card = document.createElement('div');
    card.className = `card side-${side}`;
    const head = document.createElement('div');
    head.className = 'card-head';
    head.innerHTML = `<h3>${esc(meta.title)}</h3>`;
    card.appendChild(head);

    if(items && items.length){
      card.appendChild(bulletsWithRichContent(items));
    }
    if(refs && refs.length){
      refs.forEach(r => {
        const block = renderRefBlock(r);
        if(block) card.appendChild(block);
      });
    }
    container.appendChild(card);
  }

  function renderLesion(id){
    const lesion = byId[id];
    if(!lesion){ renderNotFound(); return; }
    const cat = catById[lesion.category];
    const cyanotic = isCyanoticCat(lesion.category);
    renderSidebarNav(lesion.category, id);

    contentEl.innerHTML = '';
    const crumb = document.createElement('div');
    crumb.className = 'crumb';
    crumb.innerHTML = `<a href="#/">Home</a> <span>/</span> <a href="#/category/${cat.id}">${esc(cat.name)}</a> <span>/</span> <span>${esc(lesion.name)}</span>`;
    contentEl.appendChild(crumb);

    const head = document.createElement('div');
    head.innerHTML = pageHeadHTML(lesion.name, lesion.short, [{ label: cyanotic ? 'Cyanotic' : 'Non-cyanotic', cyanotic: cyanotic, acyanotic: !cyanotic }]);
    contentEl.appendChild(head);

    const allTrees = lesion.decisionTrees || [];
    const topTrees = allTrees.filter(dt => dt.position !== 'end');
    const endTrees = allTrees.filter(dt => dt.position === 'end');

    topTrees.forEach(dt => {
      const mount = document.createElement('div');
      contentEl.appendChild(mount);
      new DecisionTree(mount, dt.tree, dt.title).render();
    });

    ['overview','preop','intraop','tee','postop','complications','associations'].forEach(key => {
      renderSection(contentEl, key, lesion);
    });

    if(endTrees.length){
      const heading = document.createElement('div');
      heading.className = 'section-heading';
      heading.textContent = 'Postoperative Troubleshooting';
      contentEl.appendChild(heading);
      endTrees.forEach(dt => {
        const mount = document.createElement('div');
        contentEl.appendChild(mount);
        new DecisionTree(mount, dt.tree, dt.title).render();
      });
    }

    if(lesion.overview_extra){
      const card = document.createElement('div');
      card.className = `card side-${sectionSide('overview', lesion.category)}`;
      card.innerHTML = `<div class="card-head"><h3>Background</h3></div>`;
      card.appendChild(bulletsWithRichContent(lesion.overview_extra));
      contentEl.insertBefore(card, contentEl.children[3] || null);
    }
  }

  function renderNotFound(){
    contentEl.innerHTML = `<div class="page-head"><h1>Not found</h1><p class="short">That page doesn't exist. <a href="#/">Return home</a>.</p></div>`;
  }

  function route(){
    const hash = location.hash.replace(/^#/, '') || '/';
    const parts = hash.split('/').filter(Boolean);
    closeSidebar();
    window.scrollTo(0,0);
    if(parts.length === 0){ renderHome(); return; }
    if(parts[0] === 'category' && parts[1]){ renderCategory(parts[1]); return; }
    if(parts[0] === 'lesion' && parts[1]){ renderLesion(parts[1]); return; }
    renderNotFound();
  }

  function closeSidebar(){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
  function toggleSidebar(){
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }

  window.addEventListener('hashchange', route);
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('menu-btn').addEventListener('click', toggleSidebar);
    document.getElementById('overlay').addEventListener('click', closeSidebar);
    wireSearch(document.getElementById('sidebar-search-input'), document.getElementById('sidebar-search-results'));
    route();
  });
})();
</script>
